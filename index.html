<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcard Learning App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <main class="app-shell">
    <section class="hero">
      <p class="hero-tag">Study Smarter</p>
      <h1>Flashcard Learning App</h1>
      <p class="hero-subtitle">
        Create, study, edit, and manage flashcards in one polished single-page experience.
      </p>
    </section>

    <section class="panel form-panel">
      <div class="panel-header">
        <h2>Create a Flashcard</h2>
        <p>Add a question and answer to build your study deck.</p>
      </div>

      <div class="form-grid">
        <div class="input-group">
          <label for="question">Question</label>
          <input id="question" type="text" placeholder="What is JavaScript?" />
        </div>

        <div class="input-group">
          <label for="answer">Answer</label>
          <input id="answer" type="text" placeholder="A programming language" />
        </div>

        <button class="primary-btn" onclick="addCard()">Add Card</button>
      </div>
    </section>

    <section class="toolbar-row">
      <div id="stats" class="stats-card"></div>
      <button class="secondary-btn" onclick="fetchCards()">Reset Session</button>
    </section>

    <section id="message" class="message-box hidden"></section>

    <section id="card-container" class="card-grid"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
